<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>ESG M&A 종합 분석 리포트</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<style>
:root{
  --bg:#050810;--surface:#0a0f1e;--surface2:#0f172a;
  --border:rgba(99,120,180,0.18);--border-bright:rgba(99,120,180,0.38);
  --accent:#3b82f6;--accent2:#06b6d4;--red:#f43f5e;--green:#22c55e;--gold:#f59e0b;
  --text:#e2e8f0;--text-dim:#64748b;--text-bright:#f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;line-height:1.65;min-height:100vh;overflow-x:hidden;}
*{font-family:'Pretendard',sans-serif !important;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.035) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 24px 80px;}

/* ── HEADER ── */
.rpt-header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:36px;}
.header-logo{font-size:14px;font-weight:800;letter-spacing:0.06em;color:var(--text-bright);display:flex;align-items:center;gap:10px;}
.logo-badge{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff;}
.rpt-meta{display:flex;align-items:center;gap:10px;}
.rpt-ts{font-family:monospace;font-size:10px;color:var(--text-dim);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:0.05em;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#06b6d4);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,0.3);}
.btn-primary:hover{box-shadow:0 6px 20px rgba(59,130,246,0.45);transform:translateY(-1px);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border-bright);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

/* ── TITLE SECTION ── */
.rpt-title-section{text-align:center;padding:48px 0 52px;position:relative;}
.rpt-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--accent2);background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.25);
  padding:5px 16px;border-radius:99px;margin-bottom:24px;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.rpt-h1{font-size:clamp(28px,4vw,48px);font-weight:900;letter-spacing:-0.03em;color:var(--text-bright);line-height:1.1;margin-bottom:14px;}
.rpt-h1 span{background:linear-gradient(135deg,#3b82f6,#06b6d4,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.rpt-subtitle{font-family:monospace;font-size:12px;color:var(--text-dim);letter-spacing:0.06em;}

/* ── SECTION TITLE ── */
.section-wrap{margin-bottom:44px;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.section-num{font-family:monospace;font-size:10px;font-weight:700;color:var(--accent2);background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.3);padding:3px 8px;border-radius:4px;letter-spacing:0.08em;}
.section-title{font-size:16px;font-weight:800;color:var(--text-bright);letter-spacing:-0.01em;}
.section-line{flex:1;height:1px;background:var(--border);}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}

/* ── GRID LAYOUTS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr;}}

/* ── KPI HERO CARDS ── */
.kpi-hero{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.kpi-card{border-radius:14px;padding:22px 20px 18px;border:1px solid;position:relative;overflow:hidden;transition:transform .2s;}
.kpi-card:hover{transform:translateY(-2px);}
.kpi-card::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;opacity:0.1;background:radial-gradient(circle,currentColor,transparent);}
.kpi-card.buy{border-color:rgba(59,130,246,0.45);background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(59,130,246,0.04));color:var(--accent);}
.kpi-card.sell{border-color:rgba(251,146,60,0.45);background:linear-gradient(135deg,rgba(251,146,60,0.1),rgba(251,146,60,0.04));color:#fb923c;}
.kpi-card.gap-pos{border-color:rgba(244,63,94,0.45);background:linear-gradient(135deg,rgba(244,63,94,0.1),rgba(244,63,94,0.04));color:var(--red);}
.kpi-card.gap-neg{border-color:rgba(34,197,94,0.45);background:linear-gradient(135deg,rgba(34,197,94,0.1),rgba(34,197,94,0.04));color:var(--green);}
.kpi-badge{font-family:monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;opacity:.75;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.kpi-badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.kpi-amount{font-size:32px;font-weight:900;line-height:1;color:inherit;letter-spacing:-0.02em;}
.kpi-unit{font-family:monospace;font-size:10px;opacity:.6;margin-top:4px;}
.kpi-mult{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);}
.kpi-mult-num{font-size:15px;font-weight:800;color:inherit;}
.kpi-mult-lbl{font-family:monospace;font-size:9px;color:var(--text-dim);}
.kpi-sub{font-family:monospace;font-size:10px;color:var(--text-dim);margin-top:10px;}

/* ── ESG SCORE CARDS ── */
.esg-score-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
.esg-sc{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;position:relative;overflow:hidden;}
.esg-sc-label{font-family:monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.esg-sc-val{font-size:40px;font-weight:900;line-height:1;letter-spacing:-0.02em;}
.esg-sc-total .esg-sc-val{background:linear-gradient(135deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.esg-sc-e .esg-sc-val{color:#22d3ee;}
.esg-sc-s .esg-sc-val{color:#fb923c;}
.esg-sc-g .esg-sc-val{color:#c4b5fd;}
.esg-grade{font-family:monospace;font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;display:inline-block;margin-top:10px;}

/* ── INDICATOR TABLE ── */
.ind-group{margin-bottom:16px;}
.ig-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;letter-spacing:0.06em;}
.ig-e{background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.25);color:#67e8f9;}
.ig-s{background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.25);color:#fb923c;}
.ig-g{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.25);color:#c4b5fd;}
.ig-score-badge{font-family:monospace;font-size:13px;}
.ind-row{display:grid;grid-template-columns:1fr 100px 50px;gap:6px;align-items:center;padding:8px 12px;border:1px solid var(--border);border-top:none;font-size:11px;background:var(--surface2);}
.ind-row:last-child{border-radius:0 0 8px 8px;}
.ind-row:hover{background:rgba(59,130,246,0.04);}
.ind-name{color:var(--text);font-size:11px;line-height:1.5;}
.ind-bar{height:5px;border-radius:99px;background:var(--surface);overflow:hidden;}
.ind-bar-fill{height:100%;border-radius:99px;}
.fe{background:linear-gradient(90deg,#0891b2,#22d3ee);}
.fs{background:linear-gradient(90deg,#c2410c,#fb923c);}
.fg{background:linear-gradient(90deg,#7c3aed,#c4b5fd);}
.ind-num{font-family:monospace;font-size:10px;text-align:right;color:var(--text-dim);}

/* ── RISK TABLE ── */
.risk-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-top:none;background:var(--surface2);}
.risk-row:first-child{border-radius:8px 8px 0 0;border-top:1px solid var(--border);}
.risk-row:last-child{border-radius:0 0 8px 8px;}
.risk-row:hover{background:rgba(59,130,246,0.04);}
.risk-name{flex:1;font-size:11px;color:var(--text);line-height:1.5;}
.risk-val{font-family:monospace;font-size:13px;font-weight:700;width:30px;text-align:right;}
.risk-badge{font-family:monospace;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;}
.risk-none{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
.risk-low{background:rgba(251,146,60,0.12);color:#fbbf24;border:1px solid rgba(251,146,60,0.3);}
.risk-high{background:rgba(244,63,94,0.12);color:#f87171;border:1px solid rgba(244,63,94,0.3);}

/* ── SUPPLIER TABLE ── */
.sr-header{display:grid;grid-template-columns:180px 1fr 70px 70px;gap:8px;padding:8px 12px;font-family:monospace;font-size:9px;color:var(--text-dim);letter-spacing:0.08em;border-bottom:1px solid var(--border);text-transform:uppercase;}
.sr-item{display:grid;grid-template-columns:180px 1fr 70px 70px;gap:8px;align-items:center;padding:9px 12px;border:1px solid var(--border);border-top:none;background:var(--surface2);font-size:11px;}
.sr-item:first-child{border-top:1px solid var(--border);border-radius:8px 8px 0 0;}
.sr-item:last-child{border-radius:0 0 8px 8px;}
.sr-item:hover{background:rgba(59,130,246,0.04);}
.sr-name{color:var(--text);}
.sr-bar{height:5px;border-radius:99px;background:var(--surface);overflow:hidden;}
.sr-bar-fill{height:100%;border-radius:99px;}
.sr-score{font-family:monospace;font-size:12px;font-weight:700;text-align:right;}
.sr-badge{font-family:monospace;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;text-align:center;}
.sr-high{background:rgba(244,63,94,0.12);color:#f87171;border:1px solid rgba(244,63,94,0.3);}
.sr-med{background:rgba(251,146,60,0.12);color:#fbbf24;border:1px solid rgba(251,146,60,0.3);}
.sr-low{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}

/* ── REGULATION TAGS ── */
.reg-row{display:flex;flex-wrap:wrap;gap:7px;}
.reg-tag{display:inline-flex;align-items:center;gap:4px;font-family:monospace;font-size:9px;font-weight:700;padding:4px 10px;border-radius:4px;letter-spacing:0.07em;}
.reg-pass{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
.reg-warn{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);}
.reg-fail{background:rgba(244,63,94,0.12);color:#f87171;border:1px solid rgba(244,63,94,0.3);}
.reg-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.reg-summary{display:flex;gap:24px;margin-top:14px;font-family:monospace;font-size:11px;}
.reg-sum-item{display:flex;align-items:center;gap:6px;}

/* ── AUDIT GAUGE ── */
.audit-svg-wrap{display:flex;justify-content:center;margin-bottom:16px;}
.audit-gauge-svg{width:200px;height:110px;}
.audit-factors{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.audit-factor-item{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.audit-factor-name{font-size:10px;color:var(--text-dim);}
.audit-factor-val{font-family:monospace;font-size:11px;font-weight:700;}
.af-pass{color:#4ade80;}.af-warn{color:#fbbf24;}.af-fail{color:#f87171;}

/* ── VERDICT BOX ── */
.verdict-box{border-radius:16px;padding:30px 32px;position:relative;overflow:hidden;}
.verdict-box.positive{background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(6,182,212,0.05));border:1px solid rgba(34,197,94,0.25);}
.verdict-box.caution{background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(251,146,60,0.05));border:1px solid rgba(245,158,11,0.25);}
.verdict-box.negative{background:linear-gradient(135deg,rgba(244,63,94,0.08),rgba(245,158,11,0.05));border:1px solid rgba(244,63,94,0.25);}
.verdict-box::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;opacity:0.08;background:radial-gradient(circle,currentColor,transparent);}
.verdict-label{font-family:monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:12px;}
.verdict-label.positive{color:#4ade80;}
.verdict-label.caution{color:#fbbf24;}
.verdict-label.negative{color:#f87171;}
.verdict-title{font-size:22px;font-weight:800;color:var(--text-bright);margin-bottom:10px;}
.verdict-desc{font-size:13px;color:var(--text-dim);line-height:1.8;max-width:700px;}
.verdict-items{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;}
.verdict-item{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 12px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
.vi-dot{width:6px;height:6px;border-radius:50%;}

/* ── WATERFALL ── */
.wf-chart-wrap{height:180px;display:flex;align-items:flex-end;gap:8px;position:relative;padding-top:30px;}
.wf-chart-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(99,120,180,0.2);}
.wf-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;height:100%;}
.wf-bar{width:100%;border-radius:4px 4px 0 0;position:relative;}
.wf-base{background:linear-gradient(180deg,rgba(99,102,241,0.7),rgba(99,102,241,0.4));}
.wf-neg{background:linear-gradient(180deg,rgba(244,63,94,0.8),rgba(244,63,94,0.4));}
.wf-pos{background:linear-gradient(180deg,rgba(34,197,94,0.8),rgba(34,197,94,0.4));}
.wf-buy{background:linear-gradient(180deg,rgba(59,130,246,0.9),rgba(59,130,246,0.5));box-shadow:0 0 14px rgba(59,130,246,0.3);}
.wf-sell{background:linear-gradient(180deg,rgba(251,146,60,0.9),rgba(251,146,60,0.5));box-shadow:0 0 14px rgba(251,146,60,0.3);}
.wf-lbl{font-family:monospace;font-size:9px;color:var(--text-dim);text-align:center;margin-top:6px;line-height:1.4;}
.wf-tip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);font-family:monospace;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;background:rgba(15,23,42,0.95);border:1px solid rgba(99,120,180,0.35);padding:2px 6px;border-radius:4px;}

/* ── GAP BAR ── */
.gap-bar-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;}
.gap-bar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.gap-bar-title{font-family:monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;}
.gap-bar-pct{font-size:15px;font-weight:800;color:var(--text-bright);}
.gap-track{height:12px;border-radius:99px;background:var(--surface);position:relative;overflow:hidden;}
.gap-buy-fill{position:absolute;left:0;top:0;height:100%;border-radius:99px 0 0 99px;background:linear-gradient(90deg,rgba(59,130,246,0.9),rgba(59,130,246,0.6));}
.gap-sell-fill{position:absolute;top:0;height:100%;border-radius:0 99px 99px 0;background:linear-gradient(90deg,rgba(251,146,60,0.6),rgba(251,146,60,0.9));}
.gap-labels{display:flex;justify-content:space-between;margin-top:7px;font-family:monospace;font-size:10px;}

/* ── STAT MINI ── */
.stat-mini{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
.stat-mini-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:6px;}
.stat-mini-lbl{font-family:monospace;font-size:9px;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;}

/* ── PRINT BAR ── */
.print-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.print-bar-info{font-size:11px;color:var(--text-dim);line-height:1.6;}
.print-bar-info strong{color:var(--text);font-weight:600;}
.print-bar-actions{display:flex;gap:8px;}

/* ── DIVIDER ── */
.rpt-divider{height:1px;background:var(--border);margin:44px 0;}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:80px 20px;}
.empty-icon{font-size:48px;margin-bottom:18px;}
.empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:10px;}
.empty-sub{font-size:12px;color:var(--text-dim);margin-bottom:28px;line-height:1.7;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.fade-in{animation:fadeUp .4s ease both;}
.fade-in-d1{animation-delay:.05s;}
.fade-in-d2{animation-delay:.1s;}
.fade-in-d3{animation-delay:.15s;}
.fade-in-d4{animation-delay:.2s;}
.fade-in-d5{animation-delay:.25s;}
.fade-in-d6{animation-delay:.3s;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px;}

@media print{
  body{background:#fff;color:#000;}
  body::before{display:none;}
  .print-bar,.btn{display:none!important;}
  .card,.esg-sc,.stat-mini,.kpi-card{border-color:#ddd;background:#f9f9f9;}
}
</style>
</head>
<body>
<div class="app" id="appRoot">

<!-- HEADER -->
<div class="rpt-header">
  <div class="header-logo">
    <div class="logo-badge">E</div>
    ESG M&A VALUATION ENGINE
  </div>
  <div class="rpt-meta">
    <div class="rpt-ts" id="reportTs">—</div>
    <button class="btn btn-secondary" onclick="window.opener?window.opener.focus():history.back()">← 앱으로 돌아가기</button>
    <button class="btn btn-primary" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
  </div>
</div>

<div id="reportBody">
  <!-- Filled by JS -->
</div>

</div><!-- /app -->

<script>
// ─────────────────────────────────────────────
//  LOAD DATA
// ─────────────────────────────────────────────
let D = null;
try {
  const hashData = location.hash.startsWith('#data=') ? decodeURIComponent(location.hash.slice(6)) : '';
  const raw = hashData || localStorage.getItem('esg_report');
  if (raw) D = JSON.parse(raw);
} catch(e){}

const PRESET_LABELS = {custom:'직접 입력',construction:'건설',mfg:'제조',tech:'IT/테크',env:'환경/폐기물'};

function getEsgGrade(score){
  if(score>=90) return {grade:'AA',color:'#4ade80'};
  if(score>=80) return {grade:'A',color:'#4ade80'};
  if(score>=70) return {grade:'A-',color:'#86efac'};
  if(score>=60) return {grade:'B+',color:'#fbbf24'};
  if(score>=50) return {grade:'B',color:'#fbbf24'};
  if(score>=40) return {grade:'B-',color:'#fb923c'};
  return {grade:'C',color:'#f87171'};
}

function getAuditGrade(score){
  if(score>=85) return {grade:'Excellent',color:'#4ade80'};
  if(score>=70) return {grade:'Good',color:'#86efac'};
  if(score>=55) return {grade:'Fair',color:'#fbbf24'};
  if(score>=40) return {grade:'Poor',color:'#fb923c'};
  return {grade:'Critical',color:'#f87171'};
}

function getVerdictInfo(D){
  const esg = D.esg.total;
  const gapPct = D.valuation.gapEV / D.valuation.buyEV * 100;
  const totalRisk = D.sa + D.ev + D.ac + D.ci;
  const doc = D.documentInsights;

  if(esg>=70 && totalRisk<=3 && D.audit.score>=65){
    return{cls:'positive',emoji:'✅',label:'매수 권고',title:'전략적 M&A 추진 적합',

      items:[
        {dot:'#4ade80',text:`ESG 점수: ${esg.toFixed(1)}점 (기준치 +${(esg-70).toFixed(1)})`},
        {dot:'#4ade80',text:`리스크 사건 ${totalRisk}건 (낮음)`},
        {dot:'#4ade80',text:`감사 준비도 ${D.audit.score}점`},

      ]};
  } else if(esg>=55 && totalRisk<=7){
    return{cls:'caution',emoji:'⚠️',label:'조건부 검토',title:'리스크 관리 후 추진 검토',
      desc:`ESG 종합점수 ${esg.toFixed(1)}점으로 일부 항목에서 개선이 필요합니다. 총 리스크 사건 ${totalRisk}건은 산업 평균 수준이나, 특정 지표의 집중 개선이 딜 가치를 높일 수 있습니다.${docSummary} ESG 리스크 할인율 조정 및 Earn-out 조건 설계를 통한 가격 협상을 권고합니다.`,
      items:[
        {dot:'#fbbf24',text:`ESG 점수: ${esg.toFixed(1)}점 (개선 여지)`},
        {dot:'#fbbf24',text:`리스크 사건 ${totalRisk}건 (중간)`},
        {dot:'#fbbf24',text:`Earn-out 조건 협상 권고`},
        ...(doc?[{dot:'#06b6d4',text:`내부자료 기반 보완 과제 ${doc.risk_flags?.length || 0}건`}]:[]),

  } else {

      items:[

      <div class="gap-sell-fill" style="left:${buyPct}%;width:${100-parseFloat(buyPct)}%"></div>
    </div>
    <div class="gap-labels">
      <span style="color:var(--accent);">● BUY ${D.valuation.buyEV.toLocaleString('ko-KR')}억</span>
      <span style="color:#fb923c;">SELL ${D.valuation.sellEV.toLocaleString('ko-KR')}억 ●</span>
    </div>
  </div>

  <!-- WATERFALL + CHART -->
  <div class="g2">
    <div class="card">
      <div class="card-title"><span class="card-title-dot"></span>멀티플 브릿지 (Waterfall)</div>
      <div class="wf-chart-wrap">${wfHtml}</div>
    </div>
    <div class="card">
      <div class="card-title"><span class="card-title-dot"></span>멀티플 분해 (BUY vs SELL)</div>
      <canvas id="multChart" height="180"></canvas>
    </div>
  </div>
</div>

<!-- ── SECTION 4: ESG 점수 ── -->
<div class="section-wrap fade-in fade-in-d4">
  <div class="section-header">
    <div class="section-num">04</div>
    <div class="section-title">ESG 종합 점수</div>
    <div class="section-line"></div>
  </div>

  <div class="esg-score-grid" style="margin-bottom:20px;">
    <div class="esg-sc esg-sc-total">
      <div class="esg-sc-label">종합 ESG</div>
      <div class="esg-sc-val">${D.esg.total.toFixed(1)}</div>
      <div class="esg-grade" style="background:${esgGrade.color}22;color:${esgGrade.color};border:1px solid ${esgGrade.color}44;">${esgGrade.grade}</div>
    </div>
    <div class="esg-sc esg-sc-e">
      <div class="esg-sc-label">환경(E)</div>
      <div class="esg-sc-val">${D.esg.eS.toFixed(1)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:6px;">가중치 ${D.catWeights.E}%</div>
    </div>
    <div class="esg-sc esg-sc-s">
      <div class="esg-sc-label">사회(S)</div>
      <div class="esg-sc-val">${D.esg.sS.toFixed(1)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:6px;">가중치 ${D.catWeights.S}%</div>
    </div>
    <div class="esg-sc esg-sc-g">
      <div class="esg-sc-label">지배구조(G)</div>
      <div class="esg-sc-val">${D.esg.gS.toFixed(1)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:6px;">가중치 ${D.catWeights.G}%</div>
    </div>
  </div>

  <!-- Radar + Indicator table -->
  <div class="g2">
    <div class="card">
      <div class="card-title"><span class="card-title-dot"></span>ESG 리스크 레이더</div>
      <canvas id="radarChart" height="220"></canvas>
    </div>
    <div class="card">
      <div class="card-title"><span class="card-title-dot"></span>카테고리별 세부 지표</div>
      <!-- E -->
      <div class="ind-group">
        <div class="ig-header ig-e"><span>🌿 환경(E)</span><span class="ig-score-badge">${D.esg.eS.toFixed(1)}점</span></div>
        ${indRows('E')}
      </div>
      <!-- S -->
      <div class="ind-group">
        <div class="ig-header ig-s"><span>👥 사회(S)</span><span class="ig-score-badge">${D.esg.sS.toFixed(1)}점</span></div>
        ${indRows('S')}
      </div>
      <!-- G -->
      <div class="ind-group">
        <div class="ig-header ig-g"><span>⚖️ 지배구조(G)</span><span class="ig-score-badge">${D.esg.gS.toFixed(1)}점</span></div>
        ${indRows('G')}
      </div>
    </div>
  </div>
</div>

<!-- ── SECTION 5: 리스크 이벤트 ── -->
<div class="section-wrap fade-in fade-in-d4">
  <div class="section-header">
    <div class="section-num">05</div>
    <div class="section-title">리스크 이벤트 현황</div>
    <div class="section-line"></div>
  </div>
  <div class="g2">
    <div class="card">
      <div class="card-title"><span class="card-title-dot"></span>리스크 사건 요약 (최근 3년)</div>
      ${riskHtml}
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:16px;">
        <div class="stat-mini" style="flex:1;padding:12px;">
          <div class="stat-mini-val" style="color:${(D.sa+D.ev+D.ac+D.ci)<=3?'#4ade80':(D.sa+D.ev+D.ac+D.ci)<=7?'#fbbf24':'#f87171'};font-size:28px;">${D.sa+D.ev+D.ac+D.ci}</div>
          <div class="stat-mini-lbl">총 리스크 사건</div>
        </div>
        <div class="stat-mini" style="flex:1;padding:12px;">
          <div class="stat-mini-val" style="color:#3b82f6;font-size:28px;">${D.ebitda.toLocaleString('ko-KR')}</div>
          <div class="stat-mini-lbl">EBITDA (억원)</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="card-title-dot"></span>감사 준비도 (Audit Readiness)</div>
      <div class="audit-svg-wrap">
        <svg class="audit-gauge-svg" viewBox="0 0 200 110">
          <path d="M20,95 A80,80 0 0,1 180,95" fill="none" stroke="rgba(99,120,180,0.15)" stroke-width="15" stroke-linecap="round"/>
          <path d="M20,95 A80,80 0 0,1 180,95" fill="none"
            stroke="${auditGrade.color}" stroke-width="15" stroke-linecap="round"
            stroke-dasharray="251" stroke-dashoffset="${251-(251*D.audit.score/100)}"
            style="transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);"/>
          <text x="100" y="87" text-anchor="middle" font-size="30" font-weight="900" font-family="Pretendard,sans-serif" fill="#f8fafc">${D.audit.score}</text>
          <text x="100" y="102" text-anchor="middle" font-size="10" font-family="Pretendard,monospace" fill="#64748b">/ 100점</text>
        </svg>
      </div>
      <div style="text-align:center;margin-bottom:14px;">
        <span style="font-family:var(--head);font-size:13px;font-weight:800;padding:4px 14px;border-radius:6px;background:${auditGrade.color}22;color:${auditGrade.color};border:1px solid ${auditGrade.color}44;">${auditGrade.grade}</span>
      </div>
      <div class="audit-factors">${auditFactorsHtml}</div>
    </div>
  </div>
</div>

<!-- ── SECTION 6: 규제 프레임워크 ── -->
<div class="section-wrap fade-in fade-in-d5">
  <div class="section-header">
    <div class="section-num">06</div>
    <div class="section-title">규제 프레임워크 준수 현황</div>
    <div class="section-line"></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>프레임워크별 ESG 충족 여부</div>
    <div class="reg-row">${regTagsHtml}</div>
    <div class="reg-summary" style="margin-top:14px;">
      <div class="reg-sum-item"><span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;"></span><span style="font-size:11px;color:var(--text-dim);">충족 <strong style="color:#4ade80;">${D.frameworks.pass}건</strong></span></div>
      <div class="reg-sum-item"><span style="width:8px;height:8px;border-radius:50%;background:#fbbf24;display:inline-block;"></span><span style="font-size:11px;color:var(--text-dim);">일부 미충족 <strong style="color:#fbbf24;">${D.frameworks.warn}건</strong></span></div>
      <div class="reg-sum-item"><span style="width:8px;height:8px;border-radius:50%;background:#f87171;display:inline-block;"></span><span style="font-size:11px;color:var(--text-dim);">미충족 <strong style="color:#f87171;">${D.frameworks.fail}건</strong></span></div>
    </div>
  </div>
</div>

<!-- ── SECTION 7: 공급망 ── -->
<div class="section-wrap fade-in fade-in-d5">
  <div class="section-header">
    <div class="section-num">07</div>
    <div class="section-title">공급망 리스크 스코어링</div>
    <div class="section-line"></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>공급사별 안전성 점수 (100점 기준, 높을수록 안전)</div>
    <div class="sr-header"><span>공급사</span><span>리스크 수준</span><span style="text-align:right;">점수</span><span style="text-align:center;">등급</span></div>
    ${srHtml}
    <div style="margin-top:16px;font-family:monospace;font-size:10px;color:var(--text-dim);">
      ※ HIGH (60점↓) · MED (35~60점) · LOW (35점↑) — ESG 종합점수 및 리스크 사건 기반 자동 산출
    </div>
  </div>
</div>

<!-- ── SECTION 8: 요약 통계 ── -->
<div class="section-wrap fade-in fade-in-d6">
  <div class="section-header">
    <div class="section-num">08</div>
    <div class="section-title">분석 요약 통계</div>
    <div class="section-line"></div>
  </div>
  <div class="g4">
    <div class="stat-mini">
      <div class="stat-mini-val" style="background:linear-gradient(135deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${D.esg.total.toFixed(1)}</div>
      <div class="stat-mini-lbl">ESG 종합점수</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" style="color:#3b82f6;">${D.valuation.buyMult.toFixed(2)}x</div>
      <div class="stat-mini-lbl">BUY 멀티플</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" style="color:#fb923c;">${D.valuation.sellMult.toFixed(2)}x</div>
      <div class="stat-mini-lbl">SELL 멀티플</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" style="color:${D.frameworks.pass>=8?'#4ade80':D.frameworks.pass>=5?'#fbbf24':'#f87171'};">${D.frameworks.pass}/${D.frameworks.total}</div>
      <div class="stat-mini-lbl">규제 충족</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" style="color:${D.audit.score>=70?'#4ade80':D.audit.score>=50?'#fbbf24':'#f87171'};">${D.audit.score}</div>
      <div class="stat-mini-lbl">감사 준비도</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" style="color:${D.supplierScores.filter(s=>s.badge==='HIGH').length===0?'#4ade80':D.supplierScores.filter(s=>s.badge==='HIGH').length<=2?'#fbbf24':'#f87171'};">${D.supplierScores.filter(s=>s.badge==='HIGH').length}</div>
      <div class="stat-mini-lbl">고위험 공급사</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" style="color:${(D.sa+D.ev+D.ac+D.ci)<=3?'#4ade80':(D.sa+D.ev+D.ac+D.ci)<=7?'#fbbf24':'#f87171'};">${D.sa+D.ev+D.ac+D.ci}</div>
      <div class="stat-mini-lbl">총 리스크 사건</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val" style="color:${Math.abs(gapPct)<=10?'#4ade80':Math.abs(gapPct)<=25?'#fbbf24':'#f87171'};">${Math.abs(gapPct).toFixed(1)}%</div>
      <div class="stat-mini-lbl">밸류에이션 갭</div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div style="border-top:1px solid var(--border);padding-top:24px;display:flex;align-items:center;justify-content:space-between;font-family:monospace;font-size:10px;color:var(--text-dim);">
  <div>© 2025 ESG M&A Valuation Engine · K-ESG 기반 · AI-POWERED</div>
  <div>${tsStr} 기준 생성</div>
</div>
`;

  // Init Charts
  setTimeout(()=>{
    initCharts();
  }, 100);
}

function initCharts(){
  // Mult Chart
  const multCtx = document.getElementById('multChart');
  if(multCtx && D){
    new Chart(multCtx.getContext('2d'),{
      type:'bar',
      data:{
        labels:['피어 기준','BUY 조정','BUY 멀티플','SELL 조정','SELL 멀티플'],
        datasets:[{
          data:[
            D.valuation.baseMult,
            D.valuation.buyMult-D.valuation.baseMult,
            D.valuation.buyMult,
            D.valuation.sellMult-D.valuation.baseMult,
            D.valuation.sellMult
          ],
          backgroundColor:['rgba(99,102,241,0.6)','rgba(244,63,94,0.6)','rgba(59,130,246,0.85)','rgba(34,197,94,0.6)','rgba(251,146,60,0.85)'],
          borderRadius:5
        }]
      },
      options:{
        scales:{
          y:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'rgba(99,120,180,0.1)'}},
          x:{ticks:{color:'#64748b',font:{size:9}},grid:{display:false}}
        },
        plugins:{legend:{display:false}}
      }
    });
  }

  // Radar Chart
  const radarCtx = document.getElementById('radarChart');
  if(radarCtx && D){
    const eRisk = Math.max(0, 100 - D.ev*10);
    const sRisk = Math.max(0, 100 - D.sa*12);
    const gRisk = Math.max(0, D.esg.gS - (D.ac*8 + D.ci*5));
    new Chart(radarCtx.getContext('2d'),{
      type:'radar',
      data:{
        labels:['환경(E)','사회(S)','지배구조(G)','E 리스크','S 리스크','G 리스크'],
        datasets:[
          {label:'대상기업',data:[D.esg.eS,D.esg.sS,D.esg.gS,eRisk,sRisk,Math.min(100,Math.max(0,gRisk))],backgroundColor:'rgba(59,130,246,0.15)',borderColor:'rgba(59,130,246,0.8)',pointBackgroundColor:'#3b82f6',borderWidth:2},
          {label:'업종평균',data:[70,70,70,70,70,70],backgroundColor:'rgba(99,102,241,0.05)',borderColor:'rgba(99,102,241,0.4)',borderDash:[5,5],borderWidth:1,pointBackgroundColor:'#6366f1'}
        ]
      },
      options:{
        scales:{r:{suggestedMin:0,suggestedMax:100,ticks:{color:'#64748b',backdropColor:'transparent',stepSize:25},grid:{color:'rgba(99,120,180,0.15)'},pointLabels:{color:'#94a3b8',font:{size:9}}}},
        plugins:{legend:{labels:{color:'#64748b',font:{size:10}}}}
      }
    });
  }
}

render();
</script>
</body>
</html>
