function showScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById({1:'screen-input',2:'screen-loading',3:'screen-result'}[n]).classList.add('active');
  document.querySelectorAll('.phase-item').forEach((el,i)=>{
    el.classList.remove('active','done');
    if(i+1<n)el.classList.add('done');else if(i+1===n)el.classList.add('active');
  });
}
function phaseClick(n){if(n===1)showScreen(1);if(n===3&&resultRendered)showScreen(3);}

async function runAnalysis(){
  showScreen(2);
  const steps=['ls1','ls2','ls3','ls4','ls5','ls6','ls7'];
  steps.forEach(id=>{document.getElementById(id).className='loading-step';});
  const delays=[200,600,1000,1450,1900,2300,2700];
  for(let i=0;i<steps.length;i++){
    await sleep(i===0?delays[0]:delays[i]-delays[i-1]);
    if(i>0)document.getElementById(steps[i-1]).className='loading-step ls-done';
    document.getElementById(steps[i]).className='loading-step ls-active';
  }
  await sleep(400);document.getElementById(steps[steps.length-1]).className='loading-step ls-done';
  await sleep(300);
  recalc();initCharts();renderIndicatorWeightEditor();updateCatWeights();
  resultRendered=true;showScreen(3);
  switchRTab('overview',document.querySelector('.rtab'));
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function recalc(){
  const ebitda=parseFloat(document.getElementById('ebitda').value)||200;
  const sa=parseInt(document.getElementById('seriousAccidents').value)||0;
  const ev=parseInt(document.getElementById('envViolations').value)||0;
  const ac=parseInt(document.getElementById('antiCorruption').value)||0;
  const ci=parseInt(document.getElementById('cyberIncidents').value)||0;
  const name=document.getElementById('companyName')?.value||'대상기업';
  const sector=document.getElementById('companySector')?.value||'—';
  const baseMult=getPeerMultiple();
  const{total,eS,sS,gS}=calcESG();
  const dev=total-COEFFS.ESG_BASELINE;
  let buyAdj=betaCoeffs.sa*sa*COEFFS.SA_UNIT+betaCoeffs.ev*ev*COEFFS.EV_UNIT+betaCoeffs.ac*ac*COEFFS.AC_UNIT+betaCoeffs.ci*ci*COEFFS.CI_UNIT+COEFFS.ESG_DEV_UNIT*dev;
  buyAdj=Math.max(-baseMult*0.6,Math.min(baseMult*0.15,buyAdj));
  const buyMult=Math.max(0.5,baseMult+buyAdj),buyEV=ebitda*buyMult;
  let sellAdj=COEFFS.ESG_DEV_UNIT*1.6*dev-COEFFS.SA_UNIT*0.75*sa;
  sellAdj=Math.max(-baseMult*0.1,Math.min(baseMult*0.25,sellAdj));
  const sellMult=Math.max(0.5,baseMult+sellAdj),sellEV=ebitda*sellMult;
  const gapEV=sellEV-buyEV,gapMult=sellMult-buyMult;
  document.getElementById('rrCompany').textContent=name;
  document.getElementById('rrSector').textContent=sector;
  document.getElementById('rrEbitda').textContent=Math.round(ebitda).toLocaleString('ko-KR');
  document.getElementById('rhName').textContent=name;
  document.getElementById('rhMeta').innerHTML=`<span class="rh-tag">${sector}</span><span class="rh-tag">EBITDA ${Math.round(ebitda).toLocaleString()}억</span><span class="rh-tag">ESG ${total.toFixed(1)}점</span><span class="rh-tag">피어 ${baseMult.toFixed(1)}x</span>`;
  let vHTML;
  if(total>=75&&sa===0)vHTML=`<div class="verdict-badge verdict-buy">✓ 인수 적합</div>`;
  else if(total>=60&&sa<=2)vHTML=`<div class="verdict-badge verdict-caution">⚠ 조건부 검토</div>`;
  else vHTML=`<div class="verdict-badge verdict-risk">✕ 리스크 주의</div>`;
  document.getElementById('rhVerdictBadge').innerHTML=vHTML;
  document.getElementById('rhVerdictSub').textContent=total>=75&&sa===0?'ESG 리스크 낮음 · 프리미엄 가능':total>=60&&sa<=2?'ESG 개선 조건 포함 협상 권장':'중대재해·ESG 점수 추가 실사 필요';
  document.getElementById('hBuyEV').textContent=Math.round(buyEV).toLocaleString('ko-KR');
  document.getElementById('hBuyMult').textContent=buyMult.toFixed(2)+'x';
  document.getElementById('hBuySub').textContent=`기준 ${baseMult.toFixed(2)}x → 조정 ${buyAdj>=0?'+':''}${buyAdj.toFixed(3)}x`;
  document.getElementById('hSellEV').textContent=Math.round(sellEV).toLocaleString('ko-KR');
  document.getElementById('hSellMult').textContent=sellMult.toFixed(2)+'x';
  document.getElementById('hSellSub').textContent=`기준 ${baseMult.toFixed(2)}x → 프리미엄 ${sellAdj>=0?'+':''}${sellAdj.toFixed(3)}x`;
  document.getElementById('hGapEV').textContent=Math.round(Math.abs(gapEV)).toLocaleString('ko-KR');
  document.getElementById('hGapMult').textContent=(gapMult>=0?'+':'')+gapMult.toFixed(2)+'x';
  document.getElementById('hGapCard').className='ev-hero-card gap'+(gapEV>0?' neg':'');
  document.getElementById('hGapSub').textContent=gapEV>0?'매도자 우위 · Earn-out 협상 필요':gapEV<0?'매수자 우위 · 유리한 구간':'가격 합의 구간';
  updateMBFlow(baseMult,buyAdj,sellAdj,{sa,ev,ac,ci,dev});

  updateImpactBars(ebitda,baseMult,{sa,ev,ac,ci,dev});

function updateMBFlow(base,buyAdj,sellAdj,{sa,ev,ac,ci,dev}){
  const buyMult=Math.max(0.5,base+buyAdj),sellMult=Math.max(0.5,base+sellAdj);
  const adjSA=betaCoeffs.sa*sa*COEFFS.SA_UNIT,adjEV=betaCoeffs.ev*ev*COEFFS.EV_UNIT;
  const adjAC=betaCoeffs.ac*ac*COEFFS.AC_UNIT,adjCI=betaCoeffs.ci*ci*COEFFS.CI_UNIT;
  const adjESG=COEFFS.ESG_DEV_UNIT*dev;
  const maxM=Math.max(base,buyMult,sellMult)*1.15,H=100;
  const wfBars=[
    {label:'피어\n기준',mult:base,type:'base',tip:base.toFixed(2)+'x'},
    ...(sa>0?[{label:`중대재해\n(${sa}건)`,mult:adjSA,type:'neg',tip:(adjSA>=0?'+':'')+adjSA.toFixed(3)+'x'}]:[]),
    ...(ev>0?[{label:`환경위반\n(${ev}건)`,mult:adjEV,type:'neg',tip:(adjEV>=0?'+':'')+adjEV.toFixed(3)+'x'}]:[]),
    ...(ac>0?[{label:`반부패\n(${ac}건)`,mult:adjAC,type:'neg',tip:(adjAC>=0?'+':'')+adjAC.toFixed(3)+'x'}]:[]),
    ...(ci>0?[{label:`정보보안\n(${ci}건)`,mult:adjCI,type:'neg',tip:(adjCI>=0?'+':'')+adjCI.toFixed(3)+'x'}]:[]),
    ...(Math.abs(adjESG)>0.001?[{label:'ESG\n점수',mult:adjESG,type:adjESG>=0?'pos':'neg',tip:(adjESG>=0?'+':'')+adjESG.toFixed(3)+'x'}]:[]),
    {label:'BUY\nEV',mult:buyMult,type:'buy',tip:buyMult.toFixed(2)+'x'},
    {label:'SELL\nEV',mult:sellMult,type:'sell',tip:sellMult.toFixed(2)+'x'},
  ];
  let wfHtml='';
  wfBars.forEach(b=>{
    const isAdj=b.type==='neg'||b.type==='pos';
    const barH=isAdj?Math.max(4,Math.abs(b.mult)/maxM*H):Math.max(6,b.mult/maxM*H);
    wfHtml+=`<div class="wf-bar-wrap"><div class="wf-bar wf-bar-${b.type}" style="height:${barH}px;"><div class="wf-val-tip">${b.tip}</div></div><div class="wf-label">${b.label.replace('\n','<br>')}</div></div>`;
  });
  document.getElementById('wfContainer').innerHTML=wfHtml;
  const chips=[
    {label:'피어 기준',val:base.toFixed(2)+'x',cls:'base-chip',col:'col-base'},
    ...(adjSA!==0?[{label:`중대재해×${sa}`,val:(adjSA>=0?'+':'')+adjSA.toFixed(3)+'x',cls:'neg-chip',col:'col-neg'}]:[]),
    ...(adjEV!==0?[{label:`환경위반×${ev}`,val:(adjEV>=0?'+':'')+adjEV.toFixed(3)+'x',cls:'neg-chip',col:'col-neg'}]:[]),
    ...(adjAC!==0?[{label:`반부패×${ac}`,val:(adjAC>=0?'+':'')+adjAC.toFixed(3)+'x',cls:'neg-chip',col:'col-neg'}]:[]),
    ...(adjCI!==0?[{label:`정보보안×${ci}`,val:(adjCI>=0?'+':'')+adjCI.toFixed(3)+'x',cls:'neg-chip',col:'col-neg'}]:[]),
    ...(Math.abs(adjESG)>0.001?[{label:'ESG 점수',val:(adjESG>=0?'+':'')+adjESG.toFixed(3)+'x',cls:adjESG>=0?'pos-chip':'neg-chip',col:adjESG>=0?'col-pos':'col-neg'}]:[]),
    {label:'BUY 적용',val:buyMult.toFixed(2)+'x',cls:'buy-chip',col:'col-buy'},
    {label:'SELL 요구',val:sellMult.toFixed(2)+'x',cls:'sell-chip',col:'col-sell'},
  ];
  let chipHtml='';
  chips.forEach((c,i)=>{
    if(i>0)chipHtml+=`<div class="bc-arrow">›</div>`;
    chipHtml+=`<div class="bc-item"><div class="bc-chip ${c.cls}"><div class="bc-val ${c.col}">${c.val}</div><div class="bc-lbl">${c.label}</div></div></div>`;
  });
  document.getElementById('bridgeChips').innerHTML=chipHtml;
  document.getElementById('hbSubtitle').textContent=`BUY ${buyMult.toFixed(2)}x · SELL ${sellMult.toFixed(2)}x · 갭 ${(sellMult-buyMult>=0?'+':'')+(sellMult-buyMult).toFixed(2)}x`;
}

function calcCatScore(cat){
  const inds=ESG_INDICATORS[cat],tw=inds.reduce((s,i)=>s+i.weight,0);
  return inds.reduce((s,ind)=>{const el=document.getElementById('ind_'+ind.id);return s+(el?parseFloat(el.value):ind.score)*(ind.weight/tw);},0);
}
function calcESG(){const eS=calcCatScore('E'),sS=calcCatScore('S'),gS=calcCatScore('G');return{total:eS*(catWeights.E/100)+sS*(catWeights.S/100)+gS*(catWeights.G/100),eS,sS,gS};}

function updateAuditGauge(total,eS,sS,gS,sa,ev,ac,ci){
  const riskPenalty=Math.min(40,(sa*5+ev*2+ac*3+ci*2));
  const disclosureScore=Math.min(100,(gS*0.6+eS*0.2+sS*0.2));
  const auditScore=Math.max(0,Math.min(100,total*0.45+disclosureScore*0.35-riskPenalty+5));
  const rounded=Math.round(auditScore);
  const path=document.getElementById('auditGaugePath'),valEl=document.getElementById('auditGaugeVal');
  if(!path||!valEl)return;
  setTimeout(()=>{path.style.strokeDashoffset=235-(235*rounded/100);},100);
  let grade,color;
  if(rounded>=85){grade='A 감사 준비 완료';color='#4ade80';}else if(rounded>=70){grade='B 대체로 준비됨';color='#22d3ee';}else if(rounded>=55){grade='C 보완 필요';color='#fbbf24';}else{grade='D 미흡';color='#f87171';}
  path.style.stroke=color;valEl.textContent=rounded;
  const badge=document.getElementById('auditGradeBadge');
  if(badge){badge.textContent=grade;badge.style.cssText+=`;background:${color}20;color:${color};border:1px solid ${color}50;`;}
  const factors=[{name:'ESG 종합점수',display:`${Math.round(total)}점`,pass:total>=65},{name:'지배구조 투명성',display:`${Math.round(gS)}점`,pass:gS>=60},{name:'리스크 사건 합계',display:`${sa+ev+ac+ci}건`,pass:(sa+ev+ac+ci)<=3},{name:'공시 완성도',display:`${Math.round(disclosureScore)}점`,pass:disclosureScore>=65}];
  const fEl=document.getElementById('auditFactors');
  if(fEl)fEl.innerHTML=factors.map(f=>`<div class="audit-factor-item"><span class="audit-factor-name">${f.name}</span><span class="audit-factor-val ${f.pass?'af-pass':'af-warn'}">${f.display}</span></div>`).join('');
}

function getPeerMultiple(){
  const mode=document.getElementById('multipleMode').value,peers=PEER_SETS[currentPreset]||PEER_SETS.custom;
  const evs=peers.map(p=>p.ev).sort((a,b)=>a-b);
  if(mode==='custom')return parseFloat(document.getElementById('customMultiple').value)||8;
  if(mode==='mean')return evs.reduce((s,v)=>s+v,0)/evs.length;
  if(mode==='q1')return evs[Math.floor(evs.length*0.25)];
  if(mode==='q3')return evs[Math.floor(evs.length*0.75)];
  return evs.length%2!==0?evs[Math.floor(evs.length/2)]:(evs[Math.floor(evs.length/2)-1]+evs[Math.floor(evs.length/2)])/2;
}

function buildSensitivity(){
  const ebitda=parseFloat(document.getElementById('ebitda').value)||200,base=getPeerMultiple();
  const evVal=parseInt(document.getElementById('envViolations').value)||0,ac=parseInt(document.getElementById('antiCorruption').value)||0,ci=parseInt(document.getElementById('cyberIncidents').value)||0;
  const curSA=parseInt(document.getElementById('seriousAccidents').value)||0;const{total}=calcESG();
  const curBuyM=Math.max(0.5,base+betaCoeffs.sa*curSA*COEFFS.SA_UNIT+betaCoeffs.ev*evVal*COEFFS.EV_UNIT+betaCoeffs.ac*ac*COEFFS.AC_UNIT+betaCoeffs.ci*ci*COEFFS.CI_UNIT+COEFFS.ESG_DEV_UNIT*(total-COEFFS.ESG_BASELINE));
  let t1=`<thead><tr><th>중대재해</th><th>BUY 멀티플</th><th>BUY EV</th><th>vs현재</th></tr></thead><tbody>`;
  for(let s=0;s<=8;s++){const adj=betaCoeffs.sa*s*COEFFS.SA_UNIT+betaCoeffs.ev*evVal*COEFFS.EV_UNIT+betaCoeffs.ac*ac*COEFFS.AC_UNIT+betaCoeffs.ci*ci*COEFFS.CI_UNIT+COEFFS.ESG_DEV_UNIT*(total-COEFFS.ESG_BASELINE);const m=Math.max(0.5,base+adj),v=ebitda*m,diff=(m-curBuyM)*ebitda;t1+=`<tr><td>${s}건</td><td class="${adj>=0?'cell-pos':'cell-neg'} ${s===curSA?'cell-cur':''}">${m.toFixed(2)}x</td><td class="${s===curSA?'cell-cur':''}">${Math.round(v).toLocaleString()}억</td><td class="${diff>=0?'cell-pos':'cell-neg'}">${diff>=0?'+':''}${Math.round(diff).toLocaleString()}억</td></tr>`;}
  document.getElementById('sensTable1').innerHTML=t1+'</tbody>';
  let t2=`<thead><tr><th>ESG점수</th><th>SELL 멀티플</th><th>SELL EV</th><th>갭</th></tr></thead><tbody>`;
  for(let sc=40;sc<=90;sc+=5){const sAdj=Math.max(-base*0.1,Math.min(base*0.25,COEFFS.ESG_DEV_UNIT*1.6*(sc-COEFFS.ESG_BASELINE)-COEFFS.SA_UNIT*0.75*curSA));const bAdj=betaCoeffs.sa*curSA*COEFFS.SA_UNIT+betaCoeffs.ev*evVal*COEFFS.EV_UNIT+betaCoeffs.ac*ac*COEFFS.AC_UNIT+betaCoeffs.ci*ci*COEFFS.CI_UNIT+COEFFS.ESG_DEV_UNIT*(sc-COEFFS.ESG_BASELINE);const sm=Math.max(0.5,base+sAdj),bm=Math.max(0.5,base+bAdj),sv=ebitda*sm,bv=ebitda*bm,gap=sv-bv;t2+=`<tr><td class="${Math.abs(sc-total)<3?'cell-cur':''}">${sc}점</td><td>${sm.toFixed(2)}x</td><td>${Math.round(sv).toLocaleString()}억</td><td class="${gap>0?'cell-neg':'cell-pos'}">${gap>=0?'+':''}${Math.round(gap).toLocaleString()}억</td></tr>`;}
  document.getElementById('sensTable2').innerHTML=t2+'</tbody>';
  const saVals=[0,1,2,3,4,5],esgVals=[40,50,60,70,80,90],allV=[];
  saVals.forEach(s=>esgVals.forEach(e=>{const m=Math.max(0.5,base+betaCoeffs.sa*s*COEFFS.SA_UNIT+betaCoeffs.ev*evVal*COEFFS.EV_UNIT+betaCoeffs.ac*ac*COEFFS.AC_UNIT+betaCoeffs.ci*ci*COEFFS.CI_UNIT+COEFFS.ESG_DEV_UNIT*(e-COEFFS.ESG_BASELINE));allV.push(ebitda*m);}));
  const minV=Math.min(...allV),maxV=Math.max(...allV);
  let hm=`<thead><tr><th>SA↓ ESG→</th>${esgVals.map(v=>`<th>${v}</th>`).join('')}</tr></thead><tbody>`;
  saVals.forEach(s=>{hm+=`<tr><td>${s}건</td>`;esgVals.forEach(e=>{const m=Math.max(0.5,base+betaCoeffs.sa*s*COEFFS.SA_UNIT+betaCoeffs.ev*evVal*COEFFS.EV_UNIT+betaCoeffs.ac*ac*COEFFS.AC_UNIT+betaCoeffs.ci*ci*COEFFS.CI_UNIT+COEFFS.ESG_DEV_UNIT*(e-COEFFS.ESG_BASELINE));const v=ebitda*m,t=(v-minV)/(maxV-minV);const r=Math.round(244*(1-t)+59*t),g2=Math.round(63*(1-t)+130*t),b=Math.round(94*(1-t)+246*t);const isCur=s===curSA&&Math.abs(e-total)<5;hm+=`<td style="background:rgba(${r},${g2},${b},0.28);${isCur?'outline:1px solid #3b82f6;':''}">${Math.round(v).toLocaleString()}</td>`;});hm+='</tr>';});
  document.getElementById('heatmapTable').innerHTML=hm+'</tbody>';
